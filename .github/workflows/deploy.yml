name: Deploy to Remote Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Set up WARP
      uses: fscarmen/warp-on-actions@v1.4
      
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Add host to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p ${{ secrets.SSH_PORT || '22' }} -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy to remote server
      env:
        REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        REMOTE_USER: ${{ secrets.REMOTE_USER }}
        SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        APP_NAME: pyconfhyd2026
      run: |
        # Create the deployment directory on remote server
        ssh -p $SSH_PORT $REMOTE_USER@$REMOTE_HOST "mkdir -p /apps/$APP_NAME"
        
        # Sync files to remote server (excluding .git and other unnecessary files)
        rsync -avz --delete \
          -e "ssh -p $SSH_PORT" \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='deploy' \
          --exclude='*.md' \
          --exclude='images' \
          ./ $REMOTE_USER@$REMOTE_HOST:/apps/$APP_NAME/
    
    - name: Setup systemd service
      env:
        REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        REMOTE_USER: ${{ secrets.REMOTE_USER }}
        SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        APP_NAME: pyconfhyd2026
      run: |
        # Copy systemd service file to remote
        scp -P $SSH_PORT deploy/${APP_NAME}.service $REMOTE_USER@$REMOTE_HOST:/tmp/
        
        # Setup systemd service
        ssh -p $SSH_PORT $REMOTE_USER@$REMOTE_HOST << EOF
          # Move service file to systemd directory
          mv /tmp/${APP_NAME}.service /etc/systemd/system/
          
          # Reload systemd daemon to recognize new service
          systemctl daemon-reload
          
          # Enable service to start on boot
          systemctl enable ${APP_NAME}
          
          # Restart the service
          systemctl restart ${APP_NAME}
          
          # Check service status
          systemctl status ${APP_NAME} --no-pager
        EOF
    
    - name: Verify deployment
      env:
        REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        REMOTE_USER: ${{ secrets.REMOTE_USER }}
        SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        APP_NAME: pyconfhyd2026
      run: |
        echo "Checking deployment status..."
        ssh -p $SSH_PORT $REMOTE_USER@$REMOTE_HOST "systemctl is-active ${APP_NAME}"
        echo "Deployment completed successfully!"
